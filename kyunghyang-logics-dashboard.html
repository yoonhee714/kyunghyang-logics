<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>경향로직스 라벨지 재고 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial,sans-serif;margin:20px;background:#f5f7fb}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,.1)}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
th{background:#1f4e79;color:white}
.alert{background:#ffe0e0}
.ok{background:#e7ffe7}
</style>
</head>
<body>
<h1>경향로직스 라벨지 재고 대시보드</h1>

<div class="card">
<input type="file" id="excelFile" accept=".xlsx,.xls">
<p>엑셀 업로드 → 현재고와 안전재고를 비교하여 알람 표시</p>
</div>

<div class="card">
<h3>안전재고 부족 품목</h3>
<ul id="alerts"></ul>
</div>

<div class="card">
<table id="inventoryTable">
<thead>
<tr>
<th>규격</th>
<th>현재고</th>
<th>안전재고</th>
<th>상태</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
document.getElementById('excelFile').addEventListener('change', function(e){
 const file=e.target.files[0];
 const reader=new FileReader();

 reader.onload=function(evt){
   const data=new Uint8Array(evt.target.result);
   const wb=XLSX.read(data,{type:'array'});
   const ws=wb.Sheets[wb.SheetNames[0]];
   const rows=XLSX.utils.sheet_to_json(ws,{header:1});

   const tbody=document.querySelector("#inventoryTable tbody");
   const alerts=document.getElementById("alerts");

   tbody.innerHTML='';
   alerts.innerHTML='';

   for(let i=4;i<rows.length;i++){
      const r=rows[i];
      if(!r || !r[1]) continue;

      const spec=r[1];
      const stock=parseFloat(r[7])||0;
      const safetyText=(r[19]||"").toString();

      const safetyMatch=safetyText.match(/(\d+)/);
      const safety=safetyMatch ? parseInt(safetyMatch[1]) : 0;

      const low = safety>0 && stock<=safety;

      const tr=document.createElement("tr");
      tr.className=low ? "alert":"ok";

      tr.innerHTML=`
      <td>${spec}</td>
      <td>${stock}</td>
      <td>${safetyText}</td>
      <td>${low ? '⚠ 발주 필요':'정상'}</td>`;

      tbody.appendChild(tr);

      if(low){
         const li=document.createElement("li");
         li.textContent=`${spec} : 현재고 ${stock} / 안전재고 ${safetyText}`;
         alerts.appendChild(li);
      }
   }
 }
 reader.readAsArrayBuffer(file);
});
</script>
</body>
</html>
